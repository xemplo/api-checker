openapi: 3.1.0
info:
  title: Schema Analysis Fixture
  version: 1.0.0
paths:
  /pets:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - pet
              properties:
                pet:
                  type: object
                  required:
                    - name
                  properties:
                    name:
                      type: string
                    tags:
                      type: array
                      items:
                        type: object
                        properties:
                          code:
                            type: string
                            enum:
                              - Alpha
                              - alpha
                    createdAt:
                      type: string
                      readOnly: true
                    secret:
                      type: string
                      writeOnly: true
                    nickname:
                      type:
                        - string
                        - 'null'
      responses:
        '204':
          description: accepted
    get:
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      secret:
                        type: string
                        writeOnly: true
                      traceId:
                        type: string
                        readOnly: true