openapi: 3.1.0
info:
  title: Request Body New
  version: 1.0.0
paths:
  /pets:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - pet
              properties:
                pet:
                  type: object
                  required:
                    - name
                    - age
                  properties:
                    name:
                      type: string
                    age:
                      type: integer
                    serverAssigned:
                      type: string
                      readOnly: true
                    polymorphic:
                      oneOf:
                        - type: string
                        - type: integer
                    tags:
                      type: array
                      items:
                        type: object
                        properties:
                          label:
                            type: string
                          code:
                            type:
                              - string
                              - 'null'
      responses:
        '204':
          description: accepted